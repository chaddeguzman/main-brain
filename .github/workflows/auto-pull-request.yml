name: Open automated pull request

on:
  push:
    branches:
      - automation/main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: automated-main-pull-request
  cancel-in-progress: false

jobs:
  open-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Open or update pull request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const head = "automation/main";
            const base = "main";
            const existing = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${head}`,
              base,
              state: "open",
            });

            if (existing.data.length > 0) {
              core.notice(`Pull request #${existing.data[0].number} already tracks ${head}.`);
              return;
            }

            const message = context.payload.head_commit?.message ?? "Automated update";
            const title = message.split("\n", 1)[0];
            const created = await github.rest.pulls.create({
              owner,
              repo,
              head,
              base,
              title,
              body: [
                "This pull request was opened automatically after a local commit to `main`.",
                "",
                "The protected branch will remain unchanged until its required checks pass and the pull request is merged.",
              ].join("\n"),
            });
            core.notice(`Opened pull request #${created.data.number}.`);
